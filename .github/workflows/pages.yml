name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "assets/pets_raster/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage raster pet assets for preview
        run: |
          if [ -d assets/pets_raster ]; then
            mkdir -p docs/pets_raster
            cp -R assets/pets_raster/. docs/pets_raster/
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
